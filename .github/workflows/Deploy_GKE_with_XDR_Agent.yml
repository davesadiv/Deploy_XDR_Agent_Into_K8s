name: XDR GKE Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # Static/Public variables can stay here
  REGION: "us-central1"
  OS_TYPE: "linux"
  PACKAGE_NAME: "xdrdaemonset.yaml"
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
  # Sensitive secrets stay in Secrets
  XDR_URL: ${{ secrets.XDR_URL }}
  AUTH_ID: ${{ secrets.AUTH_ID }}
  AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: XDR API Healthcheck
        run: |
          health_response=$(curl -s "$XDR_URL/public_api/v1/healthcheck" \
            -H "Accept: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN")
          [ "$(echo "$health_response" | jq -r '.status')" != "available" ] && exit 1
          echo "API healthy."

  distribution:
    needs: healthcheck
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Generate XDR Package
        run: |
          # ... (same as previous script) ...
          # This job doesn't need the Cluster name, so it stays simple.

  deploy:
    needs: distribution
    runs-on: ubuntu-latest
    # This line connects the job to your GitHub Environment
    environment: Cortex 
    steps:
      - name: Download Package Artifact
        uses: actions/download-artifact@v4
        with:
          name: xdr-package

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          # Now pulling from the Environment Variables
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_NAME }}

      - name: Apply XDR configurations
        run: |
          kubectl create namespace cortex-xdr --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f "$PACKAGE_NAME"
          kubectl rollout status daemonset/cortex-agent -n cortex-xdr --timeout=150s
