name: GKE Provision & XDR Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGION: "us-central1"
  OS_TYPE: "linux"
  PACKAGE_NAME: "xdrdaemonset.yaml"
  # Environment Variables (set these in GitHub Settings > Environments)
  # CLUSTER_NAME: "cluster-1"
  # GCP_PROJECT_NAME: "gcp-lab01"

jobs:
  provision-gke:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Provision GKE Cluster
        run: |
          # Check if cluster exists to avoid "Already Exists" errors
          if ! gcloud container clusters describe ${{ vars.CLUSTER_NAME }} --region ${{ env.REGION }} >/dev/null 2>&1; then
            echo "Creating cluster..."
            gcloud container clusters create ${{ vars.CLUSTER_NAME }} \
              --region ${{ env.REGION }} \
              --num-nodes 2 \
              --enable-ip-alias \
              --project ${{ vars.GCP_PROJECT_NAME }}
          else
            echo "Cluster already exists. Skipping creation."
          fi

  healthcheck:
    needs: provision-gke
    runs-on: ubuntu-latest
    steps:
      - name: XDR API Healthcheck
        run: |
          health_response=$(curl -s "${{ secrets.XDR_URL }}/public_api/v1/healthcheck" \
            -H "Accept: application/json" \
            -H "x-xdr-auth-id: ${{ secrets.AUTH_ID }}" \
            -H "Authorization: ${{ secrets.AUTH_TOKEN }}")
          [ "$(echo "$health_response" | jq -r '.status')" != "available" ] && exit 1
          echo "API healthy."

  distribution:
    needs: healthcheck
    runs-on: ubuntu-latest
    steps:
      - name: Generate XDR Package
        run: |
          set -e
          # Get latest version
          agent_versions=$(curl -s -X POST "${{ secrets.XDR_URL }}/public_api/v1/distributions/get_versions" \
            -H "Content-Type: application/json" \
            -H "x-xdr-auth-id: ${{ secrets.AUTH_ID }}" \
            -H "Authorization: ${{ secrets.AUTH_TOKEN }}" -d '{}')
          
          latest_agent_version=$(echo "$agent_versions" | jq -r ".reply.\"$OS_TYPE\"[]" | tail -n 1)
          
          # Create distribution
          PAYLOAD=$(jq -n --arg pipe "$GITHUB_RUN_ID" --arg ver "$latest_agent_version" \
            '{request_data: {name: ("GH-Provision-" + $pipe), package_type: "kubernetes", agent_version: $ver, deployment_platform: "standard", default_namespace: "cortex-xdr", run_on_all_nodes: true, run_on_master_node: true}}')
          
          dist_res=$(curl -s -X POST "${{ secrets.XDR_URL }}/public_api/v1/distributions/create" \
            -H "Content-Type: application/json" \
            -H "x-xdr-auth-id: ${{ secrets.AUTH_ID }}" \
            -H "Authorization: ${{ secrets.AUTH_TOKEN }}" -d "$PAYLOAD")
          
          dist_id=$(echo "$dist_res" | jq -r '.reply.distribution_id // empty')
          
          echo "Waiting for backend..." && sleep 120
          
          # Get download URL
          url_response=$(curl -s -X POST "${{ secrets.XDR_URL }}/public_api/v1/distributions/get_dist_url" \
            -H "Content-Type: application/json" \
            -H "x-xdr-auth-id: ${{ secrets.AUTH_ID }}" \
            -H "Authorization: ${{ secrets.AUTH_TOKEN }}" \
            -d "{\"request_data\": {\"distribution_id\": \"$dist_id\", \"package_type\": \"yaml\"}}")
          
          dist_url=$(echo "$url_response" | jq -r '.reply.distribution_url // empty')
          curl --fail -L -X POST "$dist_url" -H "x-xdr-auth-id: ${{ secrets.AUTH_ID }}" -H "Authorization: ${{ secrets.AUTH_TOKEN }}" -o "$PACKAGE_NAME"

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: xdr-package
          path: ${{ env.PACKAGE_NAME }}

  deploy:
    needs: [provision-gke, distribution]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download Package
        uses: actions/download-artifact@v4
        with:
          name: xdr-package

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_KEY }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_NAME }}

      - name: Apply XDR to Cluster
        run: |
          kubectl create namespace cortex-xdr --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f "$PACKAGE_NAME"
          kubectl rollout status daemonset/cortex-agent -n cortex-xdr --timeout=150s
