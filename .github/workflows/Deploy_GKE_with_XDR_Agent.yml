name: XDR GKE Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGION: "us-central1"
  OS_TYPE: "linux"
  PACKAGE_NAME: "xdrdaemonset.yaml"
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"

jobs:
  provision-gke:
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Provision GKE Cluster
        run: |
          gcloud config set project "${{ vars.GCP_PROJECT_NAME }}"
          if ! gcloud container clusters describe "${{ vars.CLUSTER_NAME }}" --region "${{ env.REGION }}" >/dev/null 2>&1; then
            echo "Creating cluster..."
            gcloud container clusters create "${{ vars.CLUSTER_NAME }}" \
              --region "${{ env.REGION }}" \
              --num-nodes 2 \
              --enable-ip-alias \
              --quiet
          else
            echo "Cluster already exists."
          fi

  healthcheck:
    needs: provision-gke
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: XDR API Healthcheck
        env:
          # Mapping secrets locally within the job so they are available to the shell
          XDR_URL: ${{ secrets.XDR_URL }}
          AUTH_ID: ${{ secrets.AUTH_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          health_response=$(curl -s "$XDR_URL/public_api/v1/healthcheck" \
            -H "Accept: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN")
          
          if [ "$(echo "$health_response" | jq -r '.status')" != "available" ]; then
            echo "Healthcheck failed: $health_response"
            exit 1
          fi
          echo "API healthy."

  distribution:
    needs: healthcheck
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Generate XDR Package
        env:
          XDR_URL: ${{ secrets.XDR_URL }}
          AUTH_ID: ${{ secrets.AUTH_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          set -e
          agent_versions=$(curl -s -X POST "$XDR_URL/public_api/v1/distributions/get_versions" \
            -H "Content-Type: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN" -d '{}')
          
          latest_agent_version=$(echo "$agent_versions" | jq -r ".reply.\"$OS_TYPE\"[]" | tail -n 1)
          
          PAYLOAD=$(jq -n --arg pipe "$GITHUB_RUN_ID" --arg ver "$latest_agent_version" \
            '{request_data: {name: ("GH-" + $pipe), package_type: "kubernetes", agent_version: $ver, deployment_platform: "standard", default_namespace: "cortex-xdr", run_on_all_nodes: true, run_on_master_node: true}}')
          
          dist_res=$(curl -s -X POST "$XDR_URL/public_api/v1/distributions/create" \
            -H "Content-Type: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN" -d "$PAYLOAD")
          
          dist_id=$(echo "$dist_res" | jq -r '.reply.distribution_id // empty')
          
          echo "Waiting 120s for backend..." && sleep 120
          
          url_response=$(curl -s -X POST "$XDR_URL/public_api/v1/distributions/get_dist_url" \
            -H "Content-Type: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN" \
            -d "{\"request_data\": {\"distribution_id\": \"$dist_id\", \"package_type\": \"yaml\"}}")
          
          dist_url=$(echo "$url_response" | jq -r '.reply.distribution_url // empty')
          curl --fail -L -X POST "$dist_url" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" -o "$PACKAGE_NAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xdr-package
          path: ${{ env.PACKAGE_NAME }}

  deploy:
    needs: [provision-gke, distribution]
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Download Package
        uses: actions/download-artifact@v4
        with:
          name: xdr-package

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_NAME }}

      - name: Apply XDR configurations
        run: |
          kubectl create namespace cortex-xdr --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f "$PACKAGE_NAME"
          kubectl rollout status daemonset/cortex-agent -n cortex-xdr --timeout=150s
