## ##########################################################
## XDR GKE HELM DEPLOYMENT WORKFLOW
## ##########################################################
name: XDR GKE Helm Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGION: "us-central1"
  OS_TYPE: "linux"
  PACKAGE_NAME: "cortex-xdr-chart.tgz"

jobs:
  ## ##########################################################
  ## JOB 1: Healthcheck - Validates XDR API Availability
  ## ##########################################################
  healthcheck:
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: XDR API Healthcheck
        env:
          XDR_URL: ${{ secrets.XDR_URL }}
          AUTH_ID: ${{ secrets.AUTH_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          health_response=$(curl -s "$XDR_URL/public_api/v1/healthcheck" \
            -H "Accept: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN")
          
          STATUS=$(echo "$health_response" | jq -r '.status // empty')
          if [ "$STATUS" != "available" ]; then
            echo "❌ API Healthcheck Failed: $health_response"
            exit 1
          fi
          echo "✅ XDR API status verified: $STATUS"

  ## ##########################################################
  ## JOB 2: Distribution - Generates and Polls for Helm Chart
  ## ##########################################################
  distribution:
    needs: healthcheck
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Generate XDR Helm Chart
        env:
          XDR_URL: ${{ secrets.XDR_URL }}
          AUTH_ID: ${{ secrets.AUTH_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          set -e
          
          # 1. Fetch Latest Version
          agent_versions=$(curl -s -X POST "$XDR_URL/public_api/v1/distributions/get_versions" \
            -H "Content-Type: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" -d '{}')
          latest_ver=$(echo "$agent_versions" | jq -r ".reply.\"$OS_TYPE\"[]" | tail -n 1)
          echo "Targeting Version: $latest_ver"
          
          # 2. Create Distribution (Aligned with your successful UI entries)
          PAYLOAD=$(jq -n --arg pipe "$GITHUB_RUN_ID" --arg ver "$latest_ver" \
            '{request_data: {
              name: ("GH-HELM-" + $pipe), 
              package_type: "helm", 
              agent_version: $ver, 
              deployment_platform: "standard", 
              default_namespace: "cortex-xdr"
            }}')
          
          dist_res=$(curl -s -X POST "$XDR_URL/public_api/v1/distributions/create" \
            -H "Content-Type: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" -d "$PAYLOAD")
          
          dist_id=$(echo "$dist_res" | jq -r '.reply.distribution_id // empty')
          
          if [ -z "$dist_id" ] || [ "$dist_id" == "null" ]; then
            echo "❌ Failed to create distribution. API Response: $dist_res"
            exit 1
          fi
          echo "✅ Created Distribution ID: $dist_id"

          # 3. Smart Polling for URL (Handles the 500 'Object not found' lag)
          echo "Waiting for backend to generate the download link..."
          MAX_RETRIES=15
          dist_url=""

          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "Attempt $i/$MAX_RETRIES: Checking chart readiness..."
            sleep 45
            
            url_response=$(curl -s -X POST "$XDR_URL/public_api/v1/distributions/get_dist_url" \
              -H "Content-Type: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" \
              -d "{\"request_data\": {\"distribution_id\": \"$dist_id\", \"package_type\": \"helm\"}}")
            
            dist_url=$(echo "$url_response" | jq -r '.reply.distribution_url // empty')
            
            if [ -n "$dist_url" ] && [ "$dist_url" != "null" ]; then
              echo "✅ Success! Download link obtained."
              break
            fi
            
            # Print status if it's still failing
            ERR_CODE=$(echo "$url_response" | jq -r '.reply.err_code // empty')
            if [ "$ERR_CODE" == "500" ]; then
               echo "Backend is still preparing the 'Object'..."
            fi
          done

          if [ -z "$dist_url" ] || [ "$dist_url" == "null" ]; then
            echo "❌ Timeout: Backend failed to provide a link. Last response: $url_response"
            exit 1
          fi
          
          # Mask and download
          echo "::add-mask::$dist_url"
          curl --fail -L -X POST "$dist_url" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN" \
            -o "$PACKAGE_NAME"

      - name: Upload Helm Chart
        uses: actions/upload-artifact@v4
        with:
          name: xdr-helm-package
          path: ${{ env.PACKAGE_NAME }}
          retention-days: 1

  ## ##########################################################
  ## JOB 3: Deploy - Connects to GKE and Installs via Helm
  ## ##########################################################
  deploy:
    needs: distribution
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Download Helm Chart
        uses: actions/download-artifact@v4
        with:
          name: xdr-helm-package

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_NAME }}

      - name: Deploy via Helm
        run: |
          # Create namespace if it doesn't exist
          kubectl create namespace cortex-xdr --dry-run=client -o yaml | kubectl apply -f -
          
          # Deploy using Helm
          helm upgrade --install cortex-xdr-agent ./${{ env.PACKAGE_NAME }} \
            --namespace cortex-xdr \
            --wait \
            --timeout 5m
          
          echo "✅ Deployment complete. Verifying pods..."
          kubectl get pods -n cortex-xdr
          
          READY_COUNT=$(kubectl get pods -n cortex-xdr --no-headers | grep "1/1" | wc -l)
          if [ "$READY_COUNT" -gt 0 ]; then
            echo "Success: $READY_COUNT XDR agent(s) are Ready."
          else
            echo "❌ Error: Agents failed to stabilize."
            exit 1
          fi
