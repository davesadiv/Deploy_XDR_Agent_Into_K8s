name: XDR GKE Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGION: "us-central1"
  OS_TYPE: "linux"
  PACKAGE_NAME: "xdrdaemonset.yaml"

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: XDR API Healthcheck
        env:
          # Mapping secrets as ENV vars keeps them out of the log command history
          XDR_URL: ${{ secrets.XDR_URL }}
          AUTH_ID: ${{ secrets.AUTH_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          health_response=$(curl -s "$XDR_URL/public_api/v1/healthcheck" \
            -H "Accept: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN")
          [ "$(echo "$health_response" | jq -r '.status')" != "available" ] && exit 1
          echo "API status verified."

  distribution:
    needs: healthcheck
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Generate XDR Package
        env:
          XDR_URL: ${{ secrets.XDR_URL }}
          AUTH_ID: ${{ secrets.AUTH_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          set -e
          agent_versions=$(curl -s -X POST "$XDR_URL/public_api/v1/distributions/get_versions" \
            -H "Content-Type: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN" -d '{}')
          
          latest_ver=$(echo "$agent_versions" | jq -r ".reply.\"$OS_TYPE\"[]" | tail -n 1)
          
          PAYLOAD=$(jq -n --arg pipe "$GITHUB_RUN_ID" --arg ver "$latest_ver" \
            '{request_data: {name: ("GH-" + $pipe), package_type: "kubernetes", agent_version: $ver, deployment_platform: "standard", default_namespace: "cortex-xdr", run_on_all_nodes: true, run_on_master_node: true}}')
          
          dist_res=$(curl -s -X POST "$XDR_URL/public_api/v1/distributions/create" \
            -H "Content-Type: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN" -d "$PAYLOAD")
          
          dist_id=$(echo "$dist_res" | jq -r '.reply.distribution_id // empty')
          sleep 120
          
          url_response=$(curl -s -X POST "$XDR_URL/public_api/v1/distributions/get_dist_url" \
            -H "Content-Type: application/json" \
            -H "x-xdr-auth-id: $AUTH_ID" \
            -H "Authorization: $AUTH_TOKEN" \
            -d "{\"request_data\": {\"distribution_id\": \"$dist_id\", \"package_type\": \"yaml\"}}")
          
          dist_url=$(echo "$url_response" | jq -r '.reply.distribution_url // empty')
          curl --fail -L -X POST "$dist_url" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" -o "$PACKAGE_NAME"

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: xdr-package
          path: ${{ env.PACKAGE_NAME }}
          retention-days: 1 # Minimizes the time the sensitive YAML stays in GitHub storage

  deploy:
    needs: distribution
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Download Package
        uses: actions/download-artifact@v4
        with:
          name: xdr-package

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin'

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_NAME }}

      - name: Apply XDR configurations
        run: |
          kubectl create namespace cortex-xdr --dry-run=client -o yaml | kubectl apply -f - --insecure-skip-tls-verify
          kubectl apply -f "$PACKAGE_NAME" --insecure-skip-tls-verify
          
          echo "Waiting 60s for initial stabilization..."
          sleep 60
          
          echo "Checking Pod Status..."
          kubectl get pods -n cortex-xdr --insecure-skip-tls-verify
          
          # This logic counts how many pods are actually "1/1" (Ready)
          READY_COUNT=$(kubectl get pods -n cortex-xdr --insecure-skip-tls-verify --no-headers | grep "1/1" | wc -l)
          
          if [ "$READY_COUNT" -gt 0 ]; then
            echo "✅ Success: $READY_COUNT XDR agent(s) are Ready and Running."
          else
            echo "❌ Error: No agents reached Ready status. Check events/logs."
            kubectl get events -n cortex-xdr --sort-by='.lastTimestamp' --insecure-skip-tls-verify | tail -n 5
            exit 1
          fi
