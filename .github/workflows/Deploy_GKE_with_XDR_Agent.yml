name: XDR GKE Helm Deployment (Testing)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  REGION: "us-central1"
  OS_TYPE: "linux"
  PACKAGE_NAME: "cortex-xdr-chart.tgz"

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: XDR API Healthcheck
        env:
          XDR_URL: ${{ secrets.XDR_URL }}
          AUTH_ID: ${{ secrets.AUTH_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          health_response=$(curl -s "$XDR_URL/public_api/v1/healthcheck" \
            -H "Accept: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN")
          [ "$(echo "$health_response" | jq -r '.status')" != "available" ] && exit 1

  distribution:
    needs: healthcheck
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Generate & Fetch XDR Helm Chart
        env:
          XDR_URL: ${{ secrets.XDR_URL }}
          AUTH_ID: ${{ secrets.AUTH_ID }}
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
        run: |
          set -e
          
          # 1. Fetch versions
          agent_versions=$(curl -s -X POST "$XDR_URL/public_api/v1/distributions/get_versions" \
            -H "Content-Type: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" -d '{}')
          latest_ver=$(echo "$agent_versions" | jq -r ".reply.\"$OS_TYPE\"[]" | tail -n 1)
          
          # 2. Create Distribution
          # Note: 'platform' must be linux, 'package_type' must be helm
          PAYLOAD=$(jq -n --arg ver "$latest_ver" \
            '{request_data: {
              name: "GH-TEST-HELM", 
              platform: "linux",
              package_type: "helm", 
              agent_version: $ver, 
              deployment_platform: "standard",
              default_namespace: "cortex-xdr"
            }}')
          
          dist_res=$(curl -s -X POST "$XDR_URL/public_api/v1/distributions/create" \
            -H "Content-Type: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" -d "$PAYLOAD")
          dist_id=$(echo "$dist_res" | jq -r '.reply.distribution_id // empty')
          
          echo "✅ Distribution Initiated: $dist_id"

          # 3. Polling for URL
          # IMPORTANT: For Helm distributions, package_type in this call must be "helm"
          MAX_RETRIES=15
          dist_url=""
          for ((i=1; i<=MAX_RETRIES; i++)); do
            echo "Attempt $i/$MAX_RETRIES: Checking for Helm Object..."
            sleep 40
            url_response=$(curl -s -X POST "$XDR_URL/public_api/v1/distributions/get_dist_url" \
              -H "Content-Type: application/json" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" \
              -d "{\"request_data\": {\"distribution_id\": \"$dist_id\", \"package_type\": \"helm\"}}")
            
            dist_url=$(echo "$url_response" | jq -r '.reply.distribution_url // empty')
            if [ -n "$dist_url" ] && [ "$dist_url" != "null" ]; then
              echo "✅ Helm URL found!"
              break
            fi
          done

          if [ -z "$dist_url" ]; then
            echo "❌ Failed to retrieve Helm URL. Response: $url_response"
            exit 1
          fi
          
          echo "::add-mask::$dist_url"
          curl --fail -L -X POST "$dist_url" -H "x-xdr-auth-id: $AUTH_ID" -H "Authorization: $AUTH_TOKEN" -o "$PACKAGE_NAME"

      - name: Upload Chart
        uses: actions/upload-artifact@v4
        with:
          name: xdr-helm-package
          path: ${{ env.PACKAGE_NAME }}
          retention-days: 1

  deploy:
    needs: distribution
    runs-on: ubuntu-latest
    environment: Cortex
    steps:
      - name: Download Chart
        uses: actions/download-artifact@v4
        with:
          name: xdr-helm-package

      - name: Authenticate & Get GKE Credentials
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_KEY }}
      
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.CLUSTER_NAME }}
          location: ${{ env.REGION }}
          project_id: ${{ vars.GCP_PROJECT_NAME }}

      - name: Deploy via Helm
        run: |
          kubectl create namespace cortex-xdr --dry-run=client -o yaml | kubectl apply -f -
          helm upgrade --install cortex-xdr-agent ./${{ env.PACKAGE_NAME }} \
            --namespace cortex-xdr \
            --wait
